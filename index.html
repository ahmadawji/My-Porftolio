    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Light Mode Colors */
        --primary: 255 255 255;      /* White */
        --secondary: 248 250 252;    /* Slate 50 */
        --accent: 99 102 241;        /* Indigo 500 */
        --accent-hover: 79 70 229;   /* Indigo 600 */
        --text-primary: 15 23 42;    /* Slate 900 */
        --text-secondary: 71 85 105; /* Slate 600 */
        
        /* Light Gradient Colors */
        --g1: #F0F4FF;
        --g2: #E0E7FF;
        --g3: #FAE8FF;
        --g4: #F0FDFA;
      }
      
      .dark {
        /* Dark Mode Colors */
        --primary: 15 23 42;         /* Slate 900 */
        --secondary: 30 41 59;       /* Slate 800 */
        --accent: 129 140 248;       /* Indigo 400 */
        --accent-hover: 99 102 241;  /* Indigo 500 */
        --text-primary: 248 250 252; /* Slate 50 */
        --text-secondary: 148 163 184; /* Slate 400 */

        /* Dark Gradient Colors */
        --g1: #020617; /* Slate 950 */
        --g2: #1e1b4b; /* Indigo 950 */
        --g3: #2e1065; /* Violet 950 */
        --g4: #172554; /* Blue 950 */
      }

      /* Recommended CSS for Lenis */
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }
      .lenis.lenis-scrolling iframe {
        pointer-events: none;
      }

      body {
        color: rgb(var(--text-primary));
        transition: color 0.3s ease;
        overflow-x: hidden;
        width: 100%;
      }

      /* Animated Gradient Background */
      .gradient-bg {
        background: linear-gradient(-45deg, var(--g1), var(--g2), var(--g3), var(--g4));
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
      }

      @keyframes gradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--text-secondary) / 0.3);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--text-secondary) / 0.5);
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              pixel: ['"Press Start 2P"', 'cursive'],
            },
            colors: {
              primary: 'rgb(var(--primary) / <alpha-value>)',
              secondary: 'rgb(var(--secondary) / <alpha-value>)',
              accent: 'rgb(var(--accent) / <alpha-value>)',
              'accent-hover': 'rgb(var(--accent-hover) / <alpha-value>)',
              'text-primary': 'rgb(var(--text-primary) / <alpha-value>)',
              'text-secondary': 'rgb(var(--text-secondary) / <alpha-value>)',
            }
          }
        }
      }
    </script>
